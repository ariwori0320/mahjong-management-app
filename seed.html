function setStatus(cls, msg) {
  const el = document.getElementById('status');
  el.style.display = 'block'; el.className = cls; el.textContent = msg;
}

async function seed() {
  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = '投入中...';
  setStatus('info-s', '438件をSupabaseに送信中...');
  try {
    const { count } = await sb.from('games').select('*', { count: 'exact', head: true });
    if (count > 0) {
      setStatus('error', `⚠ すでに${count}件のデータが存在します。\n重複を避けるため中止しました。`);
      btn.disabled = false; btn.textContent = 'Supabaseに投入する';
      return;
    }
    for (let i = 0; i < DATA.length; i += 100) {
      const chunk = DATA.slice(i, i + 100);
      const { error } = await sb.from('games').insert(chunk);
      if (error) throw error;
      btn.textContent = `投入中... ${Math.min(i + 100, DATA.length)}/${DATA.length}件`;
    }
    setStatus('success', `✅ 438件の投入が完了しました！\n5/17以降に追加した分はアプリから手動入力してください。`);
    btn.textContent = '投入完了！';
    document.getElementById('app-link').style.display = 'block';
  } catch(e) {
    setStatus('error', '失敗: ' + e.message);
    btn.disabled = false; btn.textContent = 'Supabaseに投入する';
  }
}
