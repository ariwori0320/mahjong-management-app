<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🀄 麻雀成績管理</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #ffffff;
  --bg2: #f5f5f7;
  --border: #e0e0e0;
  --text: #111111;
  --text2: #666666;
  --text3: #aaaaaa;
  --blue: #3266ad;
  --green: #1D9E75;
  --red: #D85A30;
  --radius: 10px;
  --font: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1e; --bg2: #2c2c2e; --border: #3a3a3c;
    --text: #f2f2f7; --text2: #aeaeb2; --text3: #636366;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }
.app { max-width: 680px; margin: 0 auto; padding: 16px 14px 80px; }
.hdr { display: flex; align-items: baseline; gap: 8px; margin-bottom: 16px; }
.hdr h1 { font-size: 18px; font-weight: 600; }
.hdr small { font-size: 12px; color: var(--text2); }

/* Tabs */
.tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 16px; overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 9px 14px; font-size: 13px; cursor: pointer; border: none; background: none; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; font-family: var(--font); }
.tab.on { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }
.sec { display: none; } .sec.on { display: block; }

/* Metrics */
.mts { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px; margin-bottom: 16px; }
.mt { background: var(--bg2); border-radius: var(--radius); padding: 10px 12px; }
.mt-l { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
.mt-v { font-size: 20px; font-weight: 600; }
.g { color: var(--green); } .r { color: var(--red); }

/* Filters */
.fr { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; font-size: 13px; color: var(--text2); }
select, input[type=text], input[type=date], input[type=number] {
  font-size: 14px; padding: 7px 10px; border: 1px solid var(--border);
  border-radius: 8px; background: var(--bg); color: var(--text); font-family: var(--font);
  min-height: 36px;
}
select { cursor: pointer; }

/* Table */
.tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 7px 10px; font-weight: 600; font-size: 11px; color: var(--text2); border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 8px 10px; border-bottom: 1px solid var(--border); color: var(--text); }
tr:last-child td { border-bottom: none; }
@media (hover: hover) { tr:hover td { background: var(--bg2); } }
.bk { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; font-size: 11px; font-weight: 700; }
.b1{background:#FAC775;color:#5a3a00} .b2{background:#b0b0b0;color:#fff} .b3{background:#f0a070;color:#5a2000} .b4{background:#cce4ff;color:#003580}

/* Pager */
.pg { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-size: 13px; color: var(--text2); }
.pb { padding: 6px 14px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-family: var(--font); min-height: 36px; }
.pb:disabled { opacity: .35; cursor: default; }

/* Add form */
.af { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 14px; }
.af-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
.fg { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.ff { display: flex; flex-direction: column; gap: 4px; }
.ff label { font-size: 12px; color: var(--text2); font-weight: 600; }
.sub { background: var(--blue); color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; cursor: pointer; font-weight: 600; font-family: var(--font); width: 100%; margin-top: 4px; }
.sub:active { background: #1041b3; }
.ok { color: var(--green); font-size: 13px; margin-top: 8px; text-align: center; }

/* Rank dist */
.rd { display: flex; gap: 6px; align-items: flex-end; height: 80px; margin-bottom: 4px; }
.rb { display: flex; flex-direction: column; align-items: center; flex: 1; gap: 2px; }
.rb-b { width: 100%; border-radius: 3px 3px 0 0; }
.rb-l { font-size: 10px; color: var(--text2); }
.rb-v { font-size: 11px; font-weight: 600; }

/* Upload */
.upload-area { border: 2px dashed var(--border); border-radius: var(--radius); padding: 24px 16px; text-align: center; cursor: pointer; transition: border-color .15s, background .15s; margin-bottom: 12px; }
.upload-area:active, .upload-area.drag { border-color: var(--blue); background: rgba(50,102,173,.06); }
.upload-area input[type=file] { display: none; }
.upload-icon { font-size: 32px; margin-bottom: 8px; }
.upload-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.upload-sub { font-size: 12px; color: var(--text2); }
.ustatus { margin-top: 10px; padding: 10px 12px; border-radius: 8px; font-size: 13px; }
.ustatus.loading { background: #eef3fc; color: var(--blue); border: 1px solid rgba(50,102,173,.3); }
.ustatus.success { background: #edfaf4; color: #0a7c42; border: 1px solid rgba(10,124,66,.3); }
.ustatus.error { background: #fff0ee; color: var(--red); border: 1px solid rgba(216,90,48,.3); }
.preview-wrap { margin-top: 10px; max-height: 240px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; }
.confirm-row { display: flex; gap: 8px; margin-top: 10px; }
.confirm-btn { background: var(--green); color: #fff; border: none; border-radius: 8px; padding: 10px 16px; font-size: 13px; cursor: pointer; font-weight: 600; font-family: var(--font); flex: 1; }
.cancel-btn { background: var(--bg2); color: var(--text2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; font-size: 13px; cursor: pointer; font-family: var(--font); }

/* API Key */
.api-section { background: var(--bg2); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 12px; }
.api-section label { font-size: 12px; color: var(--text2); font-weight: 600; display: block; margin-bottom: 6px; }
.api-row { display: flex; gap: 8px; }
.api-row input { flex: 1; font-size: 13px; padding: 7px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-family: var(--font); }
.api-save { padding: 7px 14px; font-size: 13px; background: var(--blue); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-family: var(--font); white-space: nowrap; }
.api-note { font-size: 11px; color: var(--text3); margin-top: 5px; }

/* Chart wrapper */
.chart-wrap { position: relative; width: 100%; }

/* Section title */
.sec-label { font-size: 11px; color: var(--text2); font-weight: 600; margin-bottom: 6px; }

/* Action buttons (edit/delete in history rows) */
.act-btn { border: none; background: none; cursor: pointer; padding: 3px 4px; font-size: 13px; line-height: 1; opacity: .5; }
.act-btn:hover { opacity: 1; }

/* Edit modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
.modal-overlay.on { display: flex; }
.modal { background: var(--bg); border-radius: 14px; padding: 20px; width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,.25); }
.modal-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
.modal-footer { display: flex; gap: 8px; margin-top: 16px; }
.del-btn { background: var(--red); color: #fff; border: none; border-radius: 8px; padding: 10px 14px; font-size: 13px; cursor: pointer; font-family: var(--font); font-weight: 600; }
.cls-btn { background: var(--bg2); color: var(--text2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 13px; cursor: pointer; font-family: var(--font); }
</style>
</head>

<div class="app" id="root"></div>

<!-- 編集モーダル -->
<div class="modal-overlay" id="edit-modal" onclick="if(event.target===this)closeEditModal()">
  <div class="modal">

    <div class="fg">

      <div class="ff"><label>種別</label><select id="e-type"><option value="四麻">四麻</option><option value="三麻">三麻</option></select></div>
      <div class="ff"><label>順位</label><select id="e-rank"><option value="1">1位</option><option value="2">2位</option><option value="3">3位</option><option value="4">4位</option></select></div>
      <div class="ff"><label>持ち点</label><input type="number" id="e-score" placeholder="例: 35000"></div>
    </div>
    <div class="modal-footer">
      <button class="sub" style="flex:1" onclick="saveEdit()">保存</button>
      <button class="cls-btn" onclick="closeEditModal()">キャンセル</button>
      <button class="del-btn" onclick="deleteFromEdit()">削除</button>
    </div>
  </div>
</div>

// ===== localStorage 永続化 =====
const LS_KEY = 'mahjong_data_v1';
const LS_API  = 'mahjong_apikey_v1';

let _nextId = 1;
function ensureIds(data) {
  data.forEach(r => {
    if (!r._id) { r._id = _nextId++; }
    else { _nextId = Math.max(_nextId, r._id + 1); }
  });
  return data;
}

function loadData() {
  try {
    const saved = localStorage.getItem(LS_KEY);
    if (saved) return ensureIds(JSON.parse(saved));
  } catch(e) {}
  return ensureIds([...INITIAL_DATA]);
}
function saveData() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(DATA)); } catch(e) {}
}
function loadApiKey() {
  return localStorage.getItem(LS_API) || '';
}
function saveApiKey(key) {
  localStorage.setItem(LS_API, key);
}

let DATA = loadData();
let tab = 'dashboard', histPage = 1, pendingRows = [];
const PAGE = 15;
let plChart = null, trChart = null;

const fmt = n => Number(n).toLocaleString('ja-JP');
const $ = id => document.getElementById(id);

function months() { return [...new Set(DATA.map(r => r.date.slice(0,7)))].sort(); }
function places() { return [...new Set(DATA.map(r => r.place))].sort(); }
function filt(d,t,p) { return d.filter(r => (t==='all'||r.type===t) && (p==='all'||r.place===p)); }
function stats(d) {
  if (!d.length) return {total:0,avg:0,savg:0,r1:0,r2:0,r3:0,r4:0};
  const n=d.length, avg=d.reduce((s,r)=>s+r.rank_num,0)/n, savg=d.reduce((s,r)=>s+r.score,0)/n;
  return {total:n,avg,savg,r1:d.filter(r=>r.rank_num===1).length,r2:d.filter(r=>r.rank_num===2).length,r3:d.filter(r=>r.rank_num===3).length,r4:d.filter(r=>r.rank_num===4).length};
}
function rdist(id, s) {
  const counts=[s.r1,s.r2,s.r3,s.r4], n=s.total, max=Math.max(...counts,1);
  const colors=['#EF9F27','#888780','#F0997B','#7aadff'], labs=['1位','2位','3位','4位'];
  $(id).innerHTML = '<div class="rd">' + counts.map((c,i)=>
    `<div class="rb"><div class="rb-v" style="color:${colors[i]}">${n?Math.round(c/n*100):0}%</div><div class="rb-b" style="height:${Math.round(c/max*56)+4}px;background:${colors[i]}"></div><div class="rb-l">${labs[i]}</div><div class="rb-l" style="font-weight:600">${c}</div></div>`
  ).join('') + '</div>';
}
function mkChart(id, type, data, opts) {
  const c = $('c-'+id); if (!c || !window.Chart) return null;
  return new Chart(c, {type, data, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},...opts}});
}
function metHTML(s) {
  return `
    <div class="mt"><div class="mt-l">総対局数</div><div class="mt-v">${s.total}</div></div>
    <div class="mt"><div class="mt-l">平均着順</div><div class="mt-v ${s.avg<=2.34?'g':s.avg>=2.7?'r':''}">${s.avg.toFixed(2)}</div></div>
    <div class="mt"><div class="mt-l">持ち点平均</div><div class="mt-v">${fmt(Math.round(s.savg))}</div></div>
    <div class="mt"><div class="mt-l">1位率</div><div class="mt-v g">${s.total?Math.round(s.r1/s.total*100):0}%</div></div>
    <div class="mt"><div class="mt-l">4位率</div><div class="mt-v r">${s.total?Math.round(s.r4/s.total*100):0}%</div></div>`;
}
function scoreCell(score) {
  return `<td class="${score>=25000?'g':'r'}">${fmt(score)}</td>`;
}
function rowHTML(r, editable=false) {
  const acts = editable
    ? `<td style="white-space:nowrap"><button class="act-btn" title="編集" onclick="openEdit(${r._id})">✏️</button><button class="act-btn" title="削除" onclick="deleteRecord(${r._id})">🗑</button></td>`
    : '';
  return `<tr><td>${r.date.replace('2026-','')}</td><td>${r.place}</td><td style="font-size:11px">${r.type}</td><td><span class="bk b${r.rank_num}">${r.rank_num}</span></td>${scoreCell(r.score)}${acts}</tr>`;
}

  const pc={}; d.forEach(r=>{pc[r.place]=(pc[r.place]||0)+1});
  const pl=Object.keys(pc).sort((a,b)=>pc[b]-pc[a]);
  plChart = mkChart('pl','bar',{labels:pl,datasets:[{data:pl.map(x=>pc[x]),backgroundColor:'#3266ad66',borderColor:'#3266ad',borderWidth:1}]},{scales:{y:{beginAtZero:true},x:{ticks:{font:{size:10}}}}});
  if (trChart) trChart.destroy();
  const ms=months();
  const yA=ms.map(m=>{const dd=DATA.filter(r=>r.date.startsWith(m)&&r.type==='四麻');return dd.length?+(dd.reduce((s,r)=>s+r.rank_num,0)/dd.length).toFixed(2):null});
  const sA=ms.map(m=>{const dd=DATA.filter(r=>r.date.startsWith(m)&&r.type==='三麻');return dd.length?+(dd.reduce((s,r)=>s+r.rank_num,0)/dd.length).toFixed(2):null});
  trChart = mkChart('tr','line',{labels:ms.map(m=>parseInt(m.slice(5))+'月'),datasets:[
    {label:'四麻',data:yA,borderColor:'#3266ad',backgroundColor:'#3266ad18',tension:0.3,pointRadius:4,spanGaps:true},
    {label:'三麻',data:sA,borderColor:'#D85A30',backgroundColor:'#D85A3018',tension:0.3,pointRadius:4,spanGaps:true,borderDash:[5,3]}
  ]},{scales:{y:{reverse:true,min:1,max:4,ticks:{stepSize:0.5}}}});
}
function renderHist() {
  const t=$('ht').value, p=$('hp').value, m=$('hm').value, r=$('hr').value, s=$('hs').value;
  const fd=DATA.filter(x=>(t==='all'||x.type===t)&&(p==='all'||x.place===p)&&(m==='all'||x.date.startsWith(m))&&(r==='all'||x.rank_num===parseInt(r))&&(!s||x.date.includes(s))).slice().reverse();
  const tp=Math.ceil(fd.length/PAGE);
  if(histPage>tp) histPage=Math.max(1,tp);
  const pg=fd.slice((histPage-1)*PAGE, histPage*PAGE);
  $('ht-wrap').innerHTML = `<div class="tbl-wrap"><table><thead><tr><th style="width:68px">日付</th><th>場所</th><th style="width:44px">種別</th><th style="width:40px">順位</th><th style="width:90px">持ち点</th><th style="width:52px"></th></tr></thead><tbody>${pg.map(r=>rowHTML(r,true)).join('')||'<tr><td colspan="6" style="text-align:center;color:#aaa;padding:20px">データなし</td></tr>'}</tbody></table></div>`;
  $('ht-pg').innerHTML = `<button class="pb" onclick="histPage--;renderHist()" ${histPage<=1?'disabled':''}>←</button><span>${histPage}/${tp||1}ページ（${fd.length}件）</span><button class="pb" onclick="histPage++;renderHist()" ${histPage>=tp?'disabled':''}>→</button>`;
}
function renderAdd() {
  const rows = DATA.slice(-10).reverse().map(rowHTML).join('');
  $('add-rec').innerHTML = `<div class="tbl-wrap"><table><thead><tr><th>日付</th><th>場所</th><th>種別</th><th>順位</th><th>持ち点</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
function doAdd() {
  const date=$('a-date').value, plEl=$('a-place');
  const place=plEl.value==='__custom__'?$('a-custom').value.trim():plEl.value;
  const type=$('a-type').value, rn=parseInt($('a-rank').value), score=parseInt($('a-score').value)||0;
  if (!date||!place) { alert('日付と場所を入力してください'); return; }
  DATA.push({date,place,type,rank_num:rn,score,_id:_nextId++});
  saveData();
  $('a-score').value = '';
  $('add-ok').style.display = 'block';
  setTimeout(()=>$('add-ok').style.display='none', 2500);
  renderAdd();
  refreshFilters();
  $('hdr-cnt').textContent = `四麻${DATA.filter(r=>r.type==='四麻').length}件・三麻${DATA.filter(r=>r.type==='三麻').length}件・計${DATA.length}件`;
}
function toggleCustom() { $('a-custom-wrap').style.display = $('a-place').value==='__custom__'?'flex':'none'; }
function refreshFilters() {
  const ps=places(), ms=months();
  ['dp','hp'].forEach(id=>{const v=$(id).value; $(id).innerHTML='<option value="all">全て</option>'+ps.map(p=>`<option>${p}</option>`).join(''); $(id).value=v;});
  const hm=$('hm'), hmv=hm.value;
  hm.innerHTML='<option value="all">全て</option>'+ms.map(m=>`<option value="${m}">${parseInt(m.slice(5))}月</option>`).join('');
  hm.value=hmv;
  const dm=$('d-month');
  if (dm) { const dmv=dm.value; dm.innerHTML='<option value="all">全て</option>'+ms.map(m=>`<option value="${m}">${parseInt(m.slice(5))}月</option>`).join(''); dm.value=dmv; }
}
function renderMon() {
  const month=$('mm').value, type=$('mt').value;
  const d=DATA.filter(r=>r.date.startsWith(month)&&(type==='all'||r.type===type)), s=stats(d);
  const [y,mo]=month.split('-');
  $('mm-metrics').innerHTML = `
    <div class="mt"><div class="mt-l">${y}年${parseInt(mo)}月</div><div class="mt-v">${s.total}試合</div></div>
    <div class="mt"><div class="mt-l">平均着順</div><div class="mt-v ${s.avg<=2.34?'g':s.avg>=2.7?'r':''}">${s.avg.toFixed(2)}</div></div>
    <div class="mt"><div class="mt-l">持ち点平均</div><div class="mt-v">${fmt(Math.round(s.savg))}</div></div>
    <div class="mt"><div class="mt-l">1位率</div><div class="mt-v g">${s.total?Math.round(s.r1/s.total*100):0}%</div></div>
    <div class="mt"><div class="mt-l">最高点</div><div class="mt-v">${d.length?fmt(Math.max(...d.map(r=>r.score))):'-'}</div></div>`;
  rdist('mr', s);
}

// ===== Upload / AI =====
function setStatus(type, msg) {
  const el=$('upload-status'); el.style.display='block'; el.className='ustatus '+type; el.innerHTML=msg;
}
function clearStatus() { const el=$('upload-status'); if(el) el.style.display='none'; }

function showPending(rows) {
  pendingRows = rows;
  const tbody = rows.map(rowHTML).join('');
  $('upload-preview').innerHTML = `<div class="preview-wrap"><table><thead><tr><th style="width:68px">日付</th><th>場所</th><th style="width:44px">種別</th><th style="width:40px">順位</th><th style="width:90px">持ち点</th></tr></thead><tbody>${tbody}</tbody></table></div>`;
  $('confirm-row').style.display = 'flex';
}
function confirmImport() {
  const added = pendingRows.length;
  pendingRows.forEach(r => { if (!r._id) r._id = _nextId++; });
  DATA.push(...pendingRows);
  saveData();
  pendingRows = [];
  $('upload-preview').innerHTML = '';
  $('confirm-row').style.display = 'none';
  setStatus('success', `✓ ${added}件を追加しました（合計${DATA.length}件）`);
  renderAdd();
  refreshFilters();
  $('hdr-cnt').textContent = `四麻${DATA.filter(r=>r.type==='四麻').length}件・三麻${DATA.filter(r=>r.type==='三麻').length}件・計${DATA.length}件`;
}
function cancelImport() {
  pendingRows = [];
  $('upload-preview').innerHTML = '';
  $('confirm-row').style.display = 'none';
  clearStatus();
}

async function handleFile(file) {
  if (!file) return;
  clearStatus();
  $('upload-preview').innerHTML = '';
  $('confirm-row').style.display = 'none';
  const isImage = file.type.startsWith('image/');
  const isExcel = file.name.match(/\.(xlsx|xls)$/i);
  const isCsv   = file.name.match(/\.csv$/i);
  const isPdf   = file.type === 'application/pdf';
  if (!isImage && !isExcel && !isCsv && !isPdf) {
    setStatus('error','⚠ 対応形式: 画像（JPG/PNG）・Excel・CSV・PDF'); return;
  }
  const apiKey = loadApiKey();
  if (!apiKey) { setStatus('error','⚠ Anthropic APIキーを設定してください（下の「APIキー設定」欄）'); return; }
  setStatus('loading','🔍 AIがデータを解析中...');
  try {
    const base64 = await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
    const mediaType = isExcel?'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet':isCsv?'text/csv':isPdf?'application/pdf':file.type;
    const prompt = `麻雀成績データを抽出してください。以下のJSONのみを返してください（説明文不要）：
[{"date":"YYYY-MM-DD","place":"場所名","type":"四麻 or 三麻","rank_num":1～4,"score":持ち点の整数}]
・年が省略 → 2026年で補完
・四麻/三麻（「4麻」「4人」も四麻に統一）
・scoreはマイナスもそのまま整数
・データなし → []`;
    const content = isImage
      ? [{type:'image',source:{type:'base64',media_type:mediaType,data:base64}},{type:'text',text:prompt}]
      : [{type:'document',source:{type:'base64',media_type:mediaType,data:base64}},{type:'text',text:prompt}];
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,messages:[{role:'user',content}]})
    });
    if (!res.ok) { const e=await res.json(); throw new Error(e.error?.message||res.statusText); }
    const data = await res.json();
    const text = data.content?.map(c=>c.text||'').join('').trim();
    const m = text.match(/\[[\s\S]*\]/);
    if (!m) throw new Error('JSONが見つかりませんでした');
    const rows = JSON.parse(m[0]);
    if (!Array.isArray(rows)||rows.length===0) { setStatus('error','⚠ 対局データが見つかりませんでした'); return; }
    const valid = rows.filter(r=>r.date&&r.place&&(r.type==='四麻'||r.type==='三麻')&&r.rank_num>=1&&r.rank_num<=4&&typeof r.score==='number');
    if (!valid.length) { setStatus('error','⚠ 有効なデータが抽出できませんでした'); return; }
    setStatus('success',`✅ ${valid.length}件を検出。確認して追加してください。`);
    showPending(valid);
  } catch(e) {
    console.error(e);
    setStatus('error','⚠ 解析失敗: '+e.message);
  }
}

function saveApiKeyUI() {
  const key = $('api-key-input').value.trim();
  if (!key) { alert('APIキーを入力してください'); return; }
  saveApiKey(key);
  $('api-key-input').value = '••••••••••••' + key.slice(-4);
  $('api-saved-msg').style.display = 'inline';
  setTimeout(()=>$('api-saved-msg').style.display='none', 2000);
}

// ===== 編集・削除 =====
const PLACES_PRESET = ['セット','フリー','ロケット団','雀魂','日本オープン','ZENTSU大会'];
let editingId = null;

function updateHeaderCount() {
  $('hdr-cnt').textContent = `四麻${DATA.filter(r=>r.type==='四麻').length}件・三麻${DATA.filter(r=>r.type==='三麻').length}件・計${DATA.length}件`;
}

function openEdit(id) {
  const r = DATA.find(x => x._id === id);
  if (!r) return;
  editingId = id;
  $('e-date').value = r.date;
  const isPreset = PLACES_PRESET.includes(r.place);
  $('e-place').value = isPreset ? r.place : '__custom__';
  $('e-custom').value = isPreset ? '' : r.place;
  $('e-custom-wrap').style.display = isPreset ? 'none' : 'flex';
  $('e-type').value = r.type;
  $('e-rank').value = r.rank_num;
  $('e-score').value = r.score;
  $('edit-modal').classList.add('on');
}

function closeEditModal() {
  editingId = null;
  $('edit-modal').classList.remove('on');
}

function toggleEditCustom() {
  $('e-custom-wrap').style.display = $('e-place').value === '__custom__' ? 'flex' : 'none';
}

function saveEdit() {
  if (editingId === null) return;
  const idx = DATA.findIndex(x => x._id === editingId);
  if (idx === -1) return;
  const date = $('e-date').value;
  const plEl = $('e-place');
  const place = plEl.value === '__custom__' ? $('e-custom').value.trim() : plEl.value;
  const type = $('e-type').value;
  const rank_num = parseInt($('e-rank').value);
  const score = parseInt($('e-score').value) || 0;
  if (!date || !place) { alert('日付と場所を入力してください'); return; }
  DATA[idx] = {...DATA[idx], date, place, type, rank_num, score};
  saveData();
  closeEditModal();
  renderHist();
  if (tab === 'dashboard') renderDash();
  refreshFilters();
  updateHeaderCount();
}

function deleteRecord(id) {
  if (!confirm('このデータを削除しますか？')) return;
  DATA = DATA.filter(x => x._id !== id);
  saveData();
  if (editingId === id) closeEditModal();
  renderHist();
  if (tab === 'dashboard') renderDash();
  refreshFilters();
  updateHeaderCount();
}

function deleteFromEdit() {
  if (editingId !== null) deleteRecord(editingId);
}

function showTab(name) {
  tab=name; histPage=1;
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  $('sec-'+name).classList.add('on'); $('tab-'+name).classList.add('on');
  if(name==='dashboard') renderDash();
  else if(name==='history') renderHist();
  else if(name==='add') renderAdd();
}

  const ps=places(), ms=months();
  const yn=DATA.filter(r=>r.type==='四麻').length, sn=DATA.filter(r=>r.type==='三麻').length;
  const savedKey = loadApiKey();
  const keyDisplay = savedKey ? '••••••••••••'+savedKey.slice(-4) : '';

  document.getElementById('root').innerHTML = `
<div class="hdr">

</div>
<div class="tabs">

</div>

    </div>
    <div style="height:180px"><canvas id="c-tr"></canvas></div>
  </div>

    <span>月</span><select id="hm" onchange="histPage=1;renderHist()"><option value="all">全て</option>${ms.map(m=>`<option value="${m}">${parseInt(m.slice(5))}月</option>`).join('')}</select>
    <span>順位</span><select id="hr" onchange="histPage=1;renderHist()"><option value="all">全て</option><option value="1">1位</option><option value="2">2位</option><option value="3">3位</option><option value="4">4位</option></select>

</div>

<!-- データ追加 -->
<div class="sec" id="sec-add">
  <!-- APIキー設定 -->
  <div class="api-section">
    <label>🔑 Anthropic APIキー（ファイル取り込み機能に必要）</label>
    <div class="api-row">
      <input type="password" id="api-key-input" placeholder="sk-ant-..." value="${keyDisplay}">

  </div>

  <div class="af">
    <div class="af-title">📁 ファイル・画像から自動取り込み</div>
    <div class="upload-area" id="upload-drop"
      ondragover="event.preventDefault();this.classList.add('drag')"

    </div>
    <div id="upload-status" class="ustatus" style="display:none"></div>
    <div id="upload-preview"></div>
    <div id="confirm-row" class="confirm-row" style="display:none">

        <select id="a-place" onchange="toggleCustom()">
          <option>セット</option><option>フリー</option><option>ロケット団</option>
          <option>雀魂</option><option>日本オープン</option><option>ZENTSU大会</option>
          <option value="__custom__">その他...</option>
        </select>
      </div>
      <div class="ff" id="a-custom-wrap" style="display:none"><label>場所名</label><input type="text" id="a-custom" placeholder="場所名を入力"></div>

      <div class="ff"><label>順位</label><select id="a-rank"><option value="1">1位</option><option value="2">2位</option><option value="3">3位</option><option value="4">4位</option></select></div>

    </div>

    <div id="add-ok" class="ok" style="display:none">✓ 追加しました！</div>
  </div>
  <div style="font-size:13px;font-weight:600;margin-bottom:8px">最近のデータ（直近10件）</div>
  <div id="add-rec"></div>

  renderDash();
}

init();
</script>
