<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🀄 麻雀成績管理</title>
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #141d2b;
  --bg2: #1c2b3d;
  --border: #2d4260;
  --text: #f0f4f8;
  --text2: #90a8c0;
  --text3: #556d85;
  --blue: #d4a843;
  --green: #22c5b0;
  --red: #f06748;
  --radius: 10px;
  --font: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }
.app { max-width: 680px; margin: 0 auto; padding: 16px 14px 80px; }
.hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.hdr-logo { height: 64px; object-fit: contain; }
.hdr small { font-size: 12px; color: var(--text2); }
.tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 16px; overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 9px 14px; font-size: 13px; cursor: pointer; border: none; background: none; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; font-family: var(--font); }
.tab.on { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }
.sec { display: none; } .sec.on { display: block; }
.mts { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px; margin-bottom: 16px; }
.mt { background: var(--bg2); border-radius: var(--radius); padding: 10px 12px; }
.mt-l { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
.mt-v { font-size: 20px; font-weight: 600; }
.g { color: var(--green); } .r { color: var(--red); }
.fr { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; font-size: 13px; color: var(--text2); }
select, input[type=text], input[type=date], input[type=number] {
  font-size: 14px; padding: 7px 10px; border: 1px solid var(--border);
  border-radius: 8px; background: var(--bg); color: var(--text); font-family: var(--font); min-height: 36px;
}
select { cursor: pointer; }
.tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 7px 10px; font-weight: 600; font-size: 11px; color: var(--text2); border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 8px 10px; border-bottom: 1px solid var(--border); color: var(--text); }
tr:last-child td { border-bottom: none; }
@media (hover: hover) { tr:hover td { background: var(--bg2); } }
.bk { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; font-size: 11px; font-weight: 700; }
.b1{background:#FAC775;color:#5a3a00} .b2{background:#b0b0b0;color:#fff} .b3{background:#f0a070;color:#5a2000} .b4{background:#cce4ff;color:#003580}
.pg { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-size: 13px; color: var(--text2); }
.pb { padding: 6px 14px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-family: var(--font); min-height: 36px; }
.pb:disabled { opacity: .35; cursor: default; }
.af { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 14px; }
.af-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
.fg { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.ff { display: flex; flex-direction: column; gap: 4px; }
.ff label { font-size: 12px; color: var(--text2); font-weight: 600; }
.sub { background: var(--blue); color: #141d2b; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; cursor: pointer; font-weight: 700; font-family: var(--font); width: 100%; margin-top: 4px; }
.sub:disabled { opacity: .5; cursor: default; }
.sub:active:not(:disabled) { filter: brightness(.88); }
.ok { color: var(--green); font-size: 13px; margin-top: 8px; text-align: center; }
.rd { display: flex; gap: 6px; align-items: flex-end; height: 80px; margin-bottom: 4px; }
.rb { display: flex; flex-direction: column; align-items: center; flex: 1; gap: 2px; }
.rb-b { width: 100%; border-radius: 3px 3px 0 0; }
.rb-l { font-size: 10px; color: var(--text2); }
.rb-v { font-size: 11px; font-weight: 600; }
.upload-area { border: 2px dashed var(--border); border-radius: var(--radius); padding: 24px 16px; text-align: center; cursor: pointer; transition: border-color .15s, background .15s; margin-bottom: 12px; }
.upload-area:active, .upload-area.drag { border-color: var(--blue); background: rgba(50,102,173,.06); }
.upload-area input[type=file] { display: none; }
.upload-icon { font-size: 32px; margin-bottom: 8px; }
.upload-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.upload-sub { font-size: 12px; color: var(--text2); }
.ustatus { margin-top: 10px; padding: 10px 12px; border-radius: 8px; font-size: 13px; }
.ustatus.loading { background: rgba(201,162,39,.1); color: var(--blue); border: 1px solid rgba(201,162,39,.35); }
.ustatus.success { background: rgba(26,181,160,.1); color: var(--green); border: 1px solid rgba(26,181,160,.35); }
.ustatus.error { background: rgba(224,92,58,.1); color: var(--red); border: 1px solid rgba(224,92,58,.35); }
.preview-wrap { margin-top: 10px; max-height: 240px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; }
.confirm-row { display: flex; gap: 8px; margin-top: 10px; }
.confirm-btn { background: var(--green); color: #fff; border: none; border-radius: 8px; padding: 10px 16px; font-size: 13px; cursor: pointer; font-weight: 600; font-family: var(--font); flex: 1; }
.confirm-btn:disabled { opacity: .5; cursor: default; }
.cancel-btn { background: var(--bg2); color: var(--text2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; font-size: 13px; cursor: pointer; font-family: var(--font); }
.api-section { background: var(--bg2); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 12px; }
.api-section label { font-size: 12px; color: var(--text2); font-weight: 600; display: block; margin-bottom: 6px; }
.api-row { display: flex; gap: 8px; }
.api-row input { flex: 1; font-size: 13px; padding: 7px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-family: var(--font); }
.api-save { padding: 7px 14px; font-size: 13px; background: var(--blue); color: #141d2b; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; font-family: var(--font); white-space: nowrap; }
.api-note { font-size: 11px; color: var(--text3); margin-top: 5px; }
.sec-label { font-size: 11px; color: var(--text2); font-weight: 600; margin-bottom: 6px; }
/* フィルターパネル */
.filter-panel { background: var(--bg2); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 14px; display: flex; flex-direction: column; gap: 10px; }
.filter-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.filter-group { display: flex; flex-direction: column; gap: 3px; }
.filter-group label { font-size: 11px; color: var(--text2); font-weight: 600; }
.filter-group select, .filter-group input[type=date] { font-size: 13px; min-height: 34px; }
.filter-sep { width: 100%; border: none; border-top: 1px solid var(--border); margin: 0; }
.act-btn { border: none; background: none; cursor: pointer; padding: 3px 4px; font-size: 13px; line-height: 1; opacity: .5; }
.act-btn:hover { opacity: 1; }
/* 場所チップ */
.place-chip { padding: 4px 10px; font-size: 12px; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; background: var(--bg2); color: var(--text2); font-family: var(--font); white-space: nowrap; }
.place-chip.on { background: var(--blue); color: #141d2b; border-color: var(--blue); font-weight: 700; }
/* スコア入力 */
.score-input { width: 130px; text-align: right; cursor: pointer; caret-color: transparent; }
/* 電卓モーダル */
.calc-overlay { flex: 1; background: rgba(0,0,0,0.55); }
.calc-panel { background: var(--bg2); border-radius: 16px 16px 0 0; padding: 12px 12px 28px; max-width: 360px; width: 100%; margin: 0 auto; }
.calc-disp { font-size: 30px; font-weight: 700; text-align: right; padding: 8px 14px; color: var(--text); background: var(--bg); border-radius: 10px; margin-bottom: 10px; min-height: 54px; display: flex; align-items: center; justify-content: flex-end; gap: 2px; }
.calc-disp-num { letter-spacing: 1px; }
.calc-disp-num.neg { color: var(--red); }
.calc-disp-fixed { color: var(--text3); font-size: 22px; }
.calc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.calc-btn { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 13px; font-size: 18px; font-weight: 600; color: var(--text); cursor: pointer; font-family: var(--font); }
.calc-btn:active { opacity: .7; }
.calc-btn.fn { color: var(--blue); }
.calc-btn.ok { background: var(--green); color: #141d2b; border-color: var(--green); }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
.modal-overlay.on { display: flex; }
.modal { background: var(--bg); border-radius: 14px; padding: 20px; width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,.25); }
.modal-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
.modal-footer { display: flex; gap: 8px; margin-top: 16px; }
.del-btn { background: var(--red); color: #fff; border: none; border-radius: 8px; padding: 10px 14px; font-size: 13px; cursor: pointer; font-family: var(--font); font-weight: 600; }
.cls-btn { background: var(--bg2); color: var(--text2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 13px; cursor: pointer; font-family: var(--font); }
/* Loading overlay */
#app-loading { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 300; align-items: center; justify-content: center; flex-direction: column; gap: 14px; }
#app-loading .spin { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite; }
#app-loading span { color: #fff; font-size: 14px; font-family: var(--font); }
@keyframes spin { to { transform: rotate(360deg); } }
/* Migration section */
.migrate-section { background: rgba(201,162,39,.1); border: 1px solid rgba(201,162,39,.4); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 12px; }
.migrate-section label { font-size: 12px; color: var(--blue); font-weight: 600; display: block; margin-bottom: 6px; }
.migrate-section p { font-size: 11px; color: var(--text2); margin-bottom: 8px; }
</style>
</head>
<body>

<div id="app-loading">
  <div class="spin"></div>
  <span id="loading-msg">読み込み中...</span>
</div>

<div class="app" id="root"></div>

<!-- 電卓モーダル -->
<div id="calc-modal" style="display:none;position:fixed;inset:0;z-index:3000;flex-direction:column;justify-content:flex-end">
  <div class="calc-overlay" onclick="calcClose()"></div>
  <div class="calc-panel">
    <div class="calc-disp"><span id="calc-disp" class="calc-disp-num">0</span><span class="calc-disp-fixed">00</span></div>
    <div class="calc-grid">
      <button class="calc-btn fn" onclick="calcClear()">C</button>
      <button class="calc-btn fn" onclick="calcSign()">±</button>
      <button class="calc-btn fn" onclick="calcBack()">⌫</button>
      <button class="calc-btn" onclick="calcDigit('7')">7</button>
      <button class="calc-btn" onclick="calcDigit('8')">8</button>
      <button class="calc-btn" onclick="calcDigit('9')">9</button>
      <button class="calc-btn" onclick="calcDigit('4')">4</button>
      <button class="calc-btn" onclick="calcDigit('5')">5</button>
      <button class="calc-btn" onclick="calcDigit('6')">6</button>
      <button class="calc-btn" onclick="calcDigit('1')">1</button>
      <button class="calc-btn" onclick="calcDigit('2')">2</button>
      <button class="calc-btn" onclick="calcDigit('3')">3</button>
      <button class="calc-btn" onclick="calcDigit('00')">00</button>
      <button class="calc-btn" onclick="calcDigit('0')">0</button>
      <button class="calc-btn ok" onclick="calcOK()">OK</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="edit-modal" onclick="if(event.target===this)closeEditModal()">
  <div class="modal">
    <div class="modal-title">✏️ データを編集</div>
    <div class="fg">
      <div class="ff"><label>日付</label><input type="date" id="e-date"></div>
      <div class="ff"><label>場所</label>
        <select id="e-place" onchange="toggleEditCustom()">
          <option>セット</option><option>フリー</option><option>ロケット団</option>
          <option>雀魂</option><option>日本オープン</option><option>ZENTSU大会</option>
          <option value="__custom__">その他...</option>
        </select>
      </div>
      <div class="ff" id="e-custom-wrap" style="display:none"><label>場所名</label><input type="text" id="e-custom" placeholder="場所名を入力"></div>
      <div class="ff"><label>種別</label><select id="e-type" onchange="updateRankOptions('e-type','e-rank')"><option value="四麻">四麻</option><option value="三麻">三麻</option></select></div>
      <div class="ff"><label>順位</label><select id="e-rank"><option value="1">1位</option><option value="2">2位</option><option value="3">3位</option><option value="4">4位</option></select></div>
      <div class="ff"><label>持ち点</label><input class="score-input" type="text" id="e-score" placeholder="タップして入力" readonly onclick="openCalc('e-score')"></div>
    </div>
    <div class="modal-footer">
      <button class="sub" style="flex:1" id="save-edit-btn" onclick="saveEdit()">保存</button>
      <button class="cls-btn" onclick="closeEditModal()">キャンセル</button>
      <button class="del-btn" onclick="deleteFromEdit()">削除</button>
    </div>
  </div>
</div>

<script>
// ===== Supabase 設定 =====
const SUPABASE_URL = 'https://hhaktogoinqxtxqkaqri.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhoYWt0b2dvaW5xeHR4cWthcXJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MTgwNDQsImV4cCI6MjA5NTI5NDA0NH0.WTqMyxhwu-kEuUFh3OI9oTc56XXC79cIavAMKP0iYRA';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ===== 定数 =====
const LS_MIGRATE = 'mahjong_data_v1';
const LS_CUSTOM_PLACES = 'mahjong_custom_places';
const PLACES_PRESET = ['セット','フリー','ロケット団','雀魂','日本オープン','ZENTSU大会'];

function loadCustomPlaces() {
  try { return JSON.parse(localStorage.getItem(LS_CUSTOM_PLACES) || '[]'); } catch { return []; }
}
function saveCustomPlace(place) {
  if (PLACES_PRESET.includes(place)) return;
  const list = loadCustomPlaces();
  if (!list.includes(place)) { list.push(place); localStorage.setItem(LS_CUSTOM_PLACES, JSON.stringify(list)); }
}
function placeOptionHTML(selected) {
  const custom = loadCustomPlaces();
  return [...PLACES_PRESET, ...custom].map(p => `<option${selected===p?' selected':''}>${p}</option>`).join('')
    + '<option value="__custom__">その他...</option>';
}
function refreshAddPlaceSelect(newPlace) {
  const el = $('a-place'); if (!el) return;
  el.innerHTML = placeOptionHTML(newPlace);
  if (newPlace) { el.value = newPlace; $('a-custom-wrap').style.display = 'none'; }
}
const PAGE = 15;

// ===== 状態 =====
let DATA = [];
let tab = 'dashboard', histPage = 1, editingId = null;
let selectedPlaces = new Set();
let trChart = null;

const fmt = n => Number(n).toLocaleString('ja-JP');
const $ = id => document.getElementById(id);

// ===== ローディング =====
function showLoading(msg) { $('loading-msg').textContent = msg || '読み込み中...'; $('app-loading').style.display = 'flex'; }
function hideLoading() { $('app-loading').style.display = 'none'; }

// ===== DB操作 =====
async function fetchAll() {
  const { data, error } = await sb.from('management_games').select('*')
    .order('date', { ascending: true }).order('id', { ascending: true });
  if (error) throw error;
  return data || [];
}

async function insertOne(r) {
  const { data, error } = await sb.from('management_games')
    .insert([{ date: r.date, place: r.place, type: r.type, rank_num: r.rank_num, score: r.score }])
    .select().single();
  if (error) throw error;
  return data;
}

async function updateOne(id, r) {
  const { error } = await sb.from('management_games')
    .update({ date: r.date, place: r.place, type: r.type, rank_num: r.rank_num, score: r.score })
    .eq('id', id);
  if (error) throw error;
}

async function deleteOne(id) {
  const { error } = await sb.from('management_games').delete().eq('id', id);
  if (error) throw error;
}

async function insertBatch(records) {
  const rows = records.map(r => ({ date: r.date, place: r.place, type: r.type, rank_num: r.rank_num, score: r.score }));
  for (let i = 0; i < rows.length; i += 500) {
    const { error } = await sb.from('management_games').insert(rows.slice(i, i + 500));
    if (error) throw error;
  }
}

// ===== ローカル→クラウド移行 =====
async function runMigration() {
  const saved = localStorage.getItem(LS_MIGRATE);
  if (!saved) { alert('移行できるローカルデータが見つかりませんでした。\niPhoneのSafariなど、以前使っていたブラウザで実行してください。'); return; }
  let records;
  try { records = JSON.parse(saved); } catch { alert('データの読み込みに失敗しました'); return; }
  if (!records.length) { alert('移行するデータがありません'); return; }
  if (!confirm(`ローカルデータ ${records.length}件 をクラウドに移行します。\nよろしいですか？`)) return;
  showLoading(`${records.length}件を移行中...`);
  try {
    await insertBatch(records);
    DATA = await fetchAll();
    localStorage.removeItem(LS_MIGRATE);
    hideLoading();
    refreshFilters();
    updateHeaderCount();
    renderDash();
    alert(`✅ ${records.length}件の移行が完了しました！`);
  } catch(e) {
    hideLoading();
    alert('移行失敗: ' + e.message);
  }
}

// ===== 統計 =====
// ===== 場所チップ複数選択 =====
function togglePlace(place) {
  if (selectedPlaces.has(place)) selectedPlaces.delete(place);
  else selectedPlaces.add(place);
  document.querySelectorAll('.place-chip').forEach(c => {
    c.classList.toggle('on', selectedPlaces.has(c.dataset.place));
  });
  renderDash();
}
function buildPlaceChips() {
  const el = $('dp-chips'); if (!el) return;
  el.innerHTML = places().map(p =>
    `<button class="place-chip${selectedPlaces.has(p)?' on':''}" data-place="${p}" onclick="togglePlace('${p}')">${p}</button>`
  ).join('');
}

// ===== 電卓 =====
let calcTarget = null;

function openCalc(inputId) {
  calcTarget = inputId;
  const stored = parseInt($(inputId).value) || 0;
  const hundreds = stored !== 0 ? Math.round(stored / 100) : 0;
  setCalcDisp(String(hundreds === 0 ? '0' : hundreds));
  $('calc-modal').style.display = 'flex';
}

function setCalcDisp(val) {
  const el = $('calc-disp');
  el.textContent = val;
  el.className = 'calc-disp-num' + (val.startsWith('-') ? ' neg' : '');
}

function calcClose() {
  $('calc-modal').style.display = 'none';
  calcTarget = null;
}

function calcDigit(d) {
  const cur = $('calc-disp').textContent;
  const neg = cur.startsWith('-');
  const abs = neg ? cur.slice(1) : cur;
  let next;
  if (abs === '0') {
    const digits = d.replace(/^0+/, '') || '0';
    next = (neg ? '-' : '') + digits;
  } else {
    next = cur + d;
  }
  if (Math.abs(parseInt(next) || 0) <= 9999) setCalcDisp(next);
}

function calcSign() {
  const cur = $('calc-disp').textContent;
  if (cur === '0') return;
  setCalcDisp(cur.startsWith('-') ? cur.slice(1) : '-' + cur);
}

function calcBack() {
  const cur = $('calc-disp').textContent;
  if (cur === '0') return;
  const next = cur.slice(0, -1);
  setCalcDisp((!next || next === '-') ? '0' : next);
}

function calcClear() { setCalcDisp('0'); }

function calcOK() {
  if (!calcTarget) return;
  const val = $('calc-disp').textContent;
  const num = parseInt(val) || 0;
  $(calcTarget).value = num === 0 ? '' : num * 100;
  calcClose();
}

// ===== 三麻時は順位を1〜3に制限 =====
function updateRankOptions(typeId, rankId) {
  const isSanma = $(typeId).value === '三麻';
  const rank = $(rankId);
  const cur = rank.value;
  rank.innerHTML = '<option value="1">1位</option><option value="2">2位</option><option value="3">3位</option>'
    + (isSanma ? '' : '<option value="4">4位</option>');
  rank.value = (isSanma && cur === '4') ? '3' : cur;
}

function months() { return [...new Set(DATA.map(r => r.date.slice(0,7)))].sort(); }
function places() { return [...new Set(DATA.map(r => r.place))].sort(); }
function filt(d,t,p) { return d.filter(r => (t==='all'||r.type===t) && (p==='all'||r.place===p)); }
function stats(d) {
  if (!d.length) return {total:0,avg:0,savg:0,r1:0,r2:0,r3:0,r4:0};
  const n=d.length, avg=d.reduce((s,r)=>s+r.rank_num,0)/n, savg=d.reduce((s,r)=>s+r.score,0)/n;
  return {total:n,avg,savg,r1:d.filter(r=>r.rank_num===1).length,r2:d.filter(r=>r.rank_num===2).length,r3:d.filter(r=>r.rank_num===3).length,r4:d.filter(r=>r.rank_num===4).length};
}
function rdist(id, s) {
  const counts=[s.r1,s.r2,s.r3,s.r4], n=s.total, max=Math.max(...counts,1);
  const colors=['#EF9F27','#888780','#F0997B','#7aadff'], labs=['1位','2位','3位','4位'];
  const BAR_MAX = 72;
  $(id).innerHTML =
    `<div style="display:flex;gap:8px;align-items:flex-end;padding-top:24px;margin-bottom:4px">` +
    counts.map((c,i) => {
      const pct = n ? Math.round(c/n*100) : 0;
      const bh = Math.round(c/max*BAR_MAX) + 4;
      return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
        <div style="font-size:12px;font-weight:700;color:${colors[i]}">${pct}%</div>
        <div style="width:100%;height:${bh}px;background:${colors[i]};border-radius:4px 4px 0 0"></div>
        <div style="font-size:10px;color:var(--text2)">${labs[i]}</div>
        <div style="font-size:11px;font-weight:600">${c}回</div>
      </div>`;
    }).join('') + `</div>`;
}
const CHART_DEFAULTS = {
  color: '#90a8c0',
  grid: { color: 'rgba(255,255,255,0.07)' },
  ticks: { color: '#90a8c0' }
};
function mkChart(id, type, data, opts) {
  const c = $('c-'+id); if (!c || !window.Chart) return null;
  const scaleDefaults = { grid: CHART_DEFAULTS.grid, ticks: CHART_DEFAULTS.ticks };
  const baseOpts = { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:scaleDefaults, y:scaleDefaults} };
  return new Chart(c, {type, data, options:{...baseOpts,...opts, scales:{...baseOpts.scales,...(opts.scales||{})}}});
}
function metHTML(s) {
  return `
    <div class="mt"><div class="mt-l">総対局数</div><div class="mt-v">${s.total}</div></div>
    <div class="mt"><div class="mt-l">平均着順</div><div class="mt-v ${s.avg<=2.34?'g':s.avg>=2.7?'r':''}">${s.avg.toFixed(2)}</div></div>
    <div class="mt"><div class="mt-l">持ち点平均</div><div class="mt-v">${fmt(Math.round(s.savg))}</div></div>`;
}
function scoreCell(score) { return `<td class="${score>=25000?'g':'r'}">${fmt(score)}</td>`; }
function rowHTML(r, editable=false) {
  const acts = editable

function renderDash() {
  const t=$('dt').value;
  const yr=$('d-year')?$('d-year').value:'all';
  const mo=$('d-month-only')?$('d-month-only').value:'all';
  let d = DATA.filter(r =>

    (mo==='all'||r.date.slice(5,7)===mo) &&
    (selectedPlaces.size===0||selectedPlaces.has(r.place))

  const sA=ms.map(m=>{const dd=DATA.filter(r=>r.date.slice(0,7)<=m&&r.type==='三麻');return dd.length?+(dd.reduce((s,r)=>s+r.rank_num,0)/dd.length).toFixed(2):null});

// ===== CSV テキストインポート =====
let csvRows = [];

function parseCSV() {
  const text = $('csv-input').value.trim();
  const statusEl = $('csv-status');
  statusEl.style.display = 'block';
  $('csv-preview').style.display = 'none';
  $('csv-confirm').style.display = 'none';
  csvRows = [];
  if (!text) { statusEl.className='ustatus error'; statusEl.textContent='⚠ データを入力してください'; return; }

  const lines = text.split('\n').map(l => l.trim()).filter(l => l);
  const errors = [];
  const curYear = new Date().getFullYear();

  for (const line of lines) {
    if (/^(日付|date)/i.test(line)) continue; // ヘッダー行スキップ
    const parts = line.split(/[,，\t]/);
    if (parts.length < 5) { errors.push(line); continue; }
    let [date, place, type, rank, score] = parts.map(p => p.trim());
    // 日付: MM-DD → YYYY-MM-DD に補完
    if (/^\d{2}-\d{2}$/.test(date)) date = `${curYear}-${date}`;
    if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) { errors.push(line); continue; }
    // 種別の表記ゆれを吸収
    if (/^(4|四|yon)/i.test(type)) type = '四麻';
    else if (/^(3|三|san)/i.test(type)) type = '三麻';
    if (type !== '四麻' && type !== '三麻') { errors.push(line); continue; }
    const rank_num = parseInt(rank);
    const scoreNum = parseInt(score);
    if (!place || rank_num < 1 || rank_num > 4 || isNaN(scoreNum)) { errors.push(line); continue; }
    csvRows.push({ date, place, type, rank_num, score: scoreNum });
  }

  if (csvRows.length === 0) {
    statusEl.className='ustatus error';
    statusEl.textContent=`⚠ 有効なデータが見つかりませんでした${errors.length?'\nエラー行: '+errors.slice(0,3).join(' / '):''}`;
    return;
  }
  statusEl.className='ustatus success';
  statusEl.textContent=`✅ ${csvRows.length}件を検出${errors.length?' （'+errors.length+'行はスキップ）':''}`;
  const tbody = csvRows.map(r=>rowHTML(r,false)).join('');
  $('csv-preview').style.display='block';
  $('csv-preview').innerHTML=`<div class="preview-wrap"><table><thead><tr><th>日付</th><th>場所</th><th>種別</th><th>順位</th><th>持ち点</th></tr></thead><tbody>${tbody}</tbody></table></div>`;
  $('csv-confirm').style.display='flex';
}

async function importCSV() {
  if (!csvRows.length) return;
  const added = csvRows.length;
  const btn = $('csv-import-btn');
  btn.disabled=true; btn.textContent='追加中...';
  try {
    await insertBatch(csvRows);
    DATA = await fetchAll();
    csvRows=[];
    $('csv-input').value='';
    $('csv-preview').style.display='none';
    $('csv-confirm').style.display='none';
    $('csv-status').className='ustatus success';
    $('csv-status').textContent=`✅ ${added}件を追加しました（合計${DATA.length}件）`;
    renderAdd(); refreshFilters(); updateHeaderCount();
  } catch(e) {
    $('csv-status').className='ustatus error';
    $('csv-status').textContent='追加失敗: '+e.message;
  }
  finally { btn.disabled=false; btn.textContent='✓ このデータを追加する'; }
}
function cancelCSV() {
  csvRows=[];
  $('csv-input').value='';
  $('csv-preview').style.display='none';
  $('csv-confirm').style.display='none';
  $('csv-status').style.display='none';
}

    <p style="font-size:12px;color:var(--text2);margin-bottom:8px">以下の形式でデータを入力・貼り付けてください（カンマ区切り）：</p>
    <pre style="font-size:11px;background:var(--bg2);padding:8px 10px;border-radius:8px;margin-bottom:10px;color:var(--text2);overflow-x:auto;white-space:pre-wrap">日付,場所,種別,順位,持ち点
2026-05-18,セット,四麻,1,45000
05-19,フリー,三麻,2,32000
05-20,雀魂,4,1,48000</pre>
    <p style="font-size:11px;color:var(--text3);margin-bottom:8px">※ 日付はMM-DDでも可（年は自動補完）。種別は「四」「4」「三」「3」でもOK。</p>
    <textarea id="csv-input" placeholder="ここにデータを貼り付け..." style="width:100%;height:140px;font-size:13px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-family:monospace;resize:vertical"></textarea>
    <button class="sub" style="margin-top:8px" onclick="parseCSV()">📋 プレビュー確認</button>
    <div id="csv-status" class="ustatus" style="display:none"></div>
    <div id="csv-preview" style="display:none;margin-top:8px"></div>
    <div id="csv-confirm" class="confirm-row" style="display:none">
      <button class="confirm-btn" id="csv-import-btn" onclick="importCSV()">✓ このデータを追加する</button>
      <button class="cancel-btn" onclick="cancelCSV()">キャンセル</button>
    </div>
  </div>
  <div style="font-size:13px;font-weight:600;margin-bottom:8px">最近のデータ（直近10件）</div>
  <div id="add-rec"></div>
</div>
`;

  hideLoading();
  renderDash();
}

init();
</script>
</body>
</html>
